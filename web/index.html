<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CEXpreTrader — сравнение стратегий</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; background: #0d1117; color: #c9d1d9; }
  header { padding: 12px 16px; border-bottom: 1px solid #21262d; }
  h1 { font-size: 15px; margin: 0 0 8px; color: #e6edf3; }
  h1 .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#f85149; margin-right:6px; }
  h1 .dot.on { background:#3fb950; }
  #strats { display: flex; gap: 8px; flex-wrap: wrap; }
  .strat { background:#0f141a; border:1px solid #21262d; border-radius:6px; padding:4px 8px; font-size:12px; }
  .strat b { color:#e6edf3; } .strat .lbl { color:#8b949e; }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  h2 { font-size: 12px; color: #8b949e; margin: 0 0 8px; text-transform: uppercase; letter-spacing: .04em; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: right; padding: 4px 8px; border-bottom: 1px solid #161b22; white-space: nowrap; }
  th { color: #8b949e; position: sticky; top: 0; background: #0d1117; }
  td.l, th.l { text-align: left; color: #e6edf3; }
  .pos { color: #3fb950; } .neg { color: #f85149; } .mut { color: #6e7681; }
  .panel { background: #0f141a; border: 1px solid #21262d; border-radius: 8px; padding: 12px; max-height: 72vh; overflow: auto; }
  .chip { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: #21262d; color: #8b949e; }
</style>
</head>
<body>
<header>
  <h1><span id="ws" class="dot"></span>CEXpreTrader — сравнение стратегий <span class="mut">· read-only</span></h1>
  <div id="strats"></div>
</header>

<div class="wrap">
  <div>
    <h2>Live-спреды (perp vs DEX)</h2>
    <div class="panel">
      <table>
        <thead><tr><th class="l">символ</th><th>сеть</th><th>DEX</th><th>perp</th><th>спред %</th></tr></thead>
        <tbody id="live"></tbody>
      </table>
    </div>
  </div>
  <div>
    <h2>Sim-позиции (последние)</h2>
    <div class="panel">
      <table>
        <thead><tr><th class="l">стратегия</th><th class="l">символ</th><th>напр.</th><th>PnL %</th><th>причина</th><th>статус</th></tr></thead>
        <tbody id="pos"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const CHAIN = { 1: 'ETH', 56: 'BSC', 8453: 'Base' };
const fmt = (x, d = 3) => (x == null ? '—' : Number(x).toFixed(d));
const cls = (x) => (x == null ? 'mut' : x >= 0 ? 'pos' : 'neg');

function renderStrats(cs) {
  document.getElementById('strats').innerHTML = (cs || []).map((c) => `
    <span class="strat"><b>${c.id}</b> <span class="lbl">откр</span> ${c.openNow} <span class="lbl">закр</span> ${c.closeCount} <span class="lbl">част</span> ${c.partialCloseCount}</span>`).join('');
}
function renderLive(rows) {
  document.getElementById('live').innerHTML = rows.map((r) => `
    <tr><td class="l">${r.symbol}</td><td><span class="chip">${CHAIN[r.chainId] || r.chainId}</span></td>
    <td>${fmt(r.dexPrice, 6)}</td><td>${fmt(r.cexMid, 6)}</td><td class="${cls(r.spreadPct)}">${fmt(r.spreadPct)}</td></tr>`).join('');
}
function renderPos(rows) {
  document.getElementById('pos').innerHTML = rows.map((r) => `
    <tr><td class="l mut">${r.strategy || '—'}</td><td class="l">${r.symbol}</td>
    <td class="mut">${r.direction === 'short_perp' ? 'short' : 'long'}</td>
    <td class="${cls(r.simPnlPct)}">${fmt(r.simPnlPct)}</td>
    <td class="mut">${r.closeReason || '—'}</td><td class="mut">${r.status}</td></tr>`).join('');
}
async function loadPositions() { try { renderPos(await (await fetch('/api/positions?limit=120')).json()); } catch {} }
function connect() {
  const ws = new WebSocket(`ws://${location.host}`);
  const dot = document.getElementById('ws');
  ws.onopen = () => dot.classList.add('on');
  ws.onclose = () => { dot.classList.remove('on'); setTimeout(connect, 2000); };
  ws.onmessage = (ev) => { const m = JSON.parse(ev.data); if (m.type !== 'tick') return; renderStrats(m.counters); renderLive(m.live); };
}
connect(); loadPositions(); setInterval(loadPositions, 5000);
</script>
</body>
</html>
